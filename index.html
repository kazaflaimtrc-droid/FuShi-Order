<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuShi</title>
  <style>
    :root{
      --green:#2E7D32;
      --green2:#43A047;
      --gold:#FFB74D;
      --bg:#F6EAD3;
      --ink:#1f2d1f;
      --card:rgba(255,255,255,.92);
      --line:rgba(46,125,50,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:18px 10px; display:flex; justify-content:center;
      background: radial-gradient(1200px 700px at 20% 10%, #fff 0%, var(--bg) 45%, #FDF2E9 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif;
      color:var(--ink);
    }
    .chat-container{
      width:100%; max-width:460px; background:var(--card); border:1px solid var(--line);
      border-radius:22px; box-shadow:0 18px 45px rgba(0,0,0,.10);
      padding:16px; display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden;
    }
    .chat-container:before{
      content:''; position:absolute; inset:-2px;
      background:linear-gradient(60deg, rgba(46,125,50,.45), rgba(255,183,77,.35));
      z-index:-1; border-radius:24px; filter:blur(18px); opacity:.55;
    }
    .top-bar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:6px 6px 12px 6px; border-bottom:1px solid var(--line);
    }
    .brand{display:flex; align-items:center; gap:10px; min-width:0;}
    .brand img{
      width:98px;
      height:112px;
      border-radius:12px;
      object-fit:contain;
      border:1px solid rgba(46,125,50,.25);
      background:#fff;
    }
    .brand .title{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .brand .title strong{
      font-size:18px; letter-spacing:.4px; color:var(--green); line-height:1.1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand .title span{
      font-size:12px; color:rgba(31,45,31,.7);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .lang-btn{
      border:1px solid rgba(46,125,50,.35); background:rgba(46,125,50,.06);
      color:var(--green); padding:7px 10px; border-radius:999px;
      font-size:12px; cursor:pointer; font-weight:700; transition:.15s; flex-shrink:0;
    }
    .lang-btn:hover{background:rgba(46,125,50,.12); transform:translateY(-1px);}
    .chat-window{
      flex:1; min-height:280px; max-height:460px; overflow:auto;
      border:1px solid var(--line); border-radius:16px; padding:12px;
      background:rgba(255,255,255,.75);
    }
    .msg{
      margin:0 0 10px 0; font-size:14px; line-height:1.5;
      padding:10px 12px; border-radius:14px; max-width:92%; word-break:break-word;
    }
    .bot{background:linear-gradient(135deg, rgba(46,125,50,.10), rgba(46,125,50,.05)); border-left:4px solid rgba(46,125,50,.55);}
    .user{margin-left:auto; text-align:right; background:linear-gradient(135deg, rgba(255,183,77,.22), rgba(255,183,77,.10)); border-right:4px solid rgba(255,183,77,.75);}
    .hot-keys{display:flex; gap:8px; overflow-x:auto; padding:2px 2px; scrollbar-width:none;}
    .hot-keys::-webkit-scrollbar{display:none}
    .hot-key-btn{
      border:1px solid rgba(46,125,50,.30); background:rgba(46,125,50,.08); color:var(--green);
      padding:9px 12px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap;
      transition:.15s; flex-shrink:0; font-weight:700;
    }
    .hot-key-btn:hover{background:rgba(46,125,50,.14); transform:translateY(-1px);}
    .forms{display:flex; flex-direction:column; gap:10px;}
    #reservationForm, #cateringForm, #memberForm {
      display:none; border:1px solid var(--line); border-radius:16px; padding:12px;
      background:rgba(46,125,50,.04);
    }
    .row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
    .row label{width:92px; font-size:13px; color:rgba(31,45,31,.85); flex-shrink:0;}
    .row input, .row textarea{
      width:100%; font-size:13px; padding:8px 10px; border-radius:10px;
      border:1px solid rgba(0,0,0,.15); background:rgba(255,255,255,.9); outline:none;
    }
    .row textarea{min-height:56px; resize:vertical;}
    .wa-btn{
      width:100%; border:none; border-radius:999px; padding:10px 12px; cursor:pointer;
      font-weight:800; color:#fff; background:linear-gradient(135deg, #25D366, #128C7E); transition:.15s;
    }
    .wa-btn:hover{transform:translateY(-1px);}
    .input-area{display:flex; gap:8px; border-top:1px solid var(--line); padding-top:10px;}
    .input-area input{
      flex:1; border:1px solid rgba(46,125,50,.25); border-radius:999px; padding:11px 12px;
      font-size:14px; outline:none; background:rgba(255,255,255,.92);
    }
    .input-area input:focus{border-color:rgba(46,125,50,.55); box-shadow:0 0 0 4px rgba(46,125,50,.08);}
    .input-area button{
      border:none; border-radius:999px; padding:11px 16px; cursor:pointer; color:#fff;
      font-weight:900; background:linear-gradient(135deg, var(--green), var(--green2)); transition:.15s; white-space:nowrap;
    }
    .input-area button:hover{transform:translateY(-1px);}
    a{color:#1a73e8; text-decoration:none;}
    a:hover{text-decoration:underline;}
    @media (max-width:600px){
      body{padding:0;}
      .chat-container{max-width:100%; height:100vh; border-radius:0; box-shadow:none;}
      .chat-window{max-height:none;}
    }
  </style>
</head>

    /************ language ************/
    function getLangFromUrlOrStorage(){
      const p = new URLSearchParams(location.search);
      const urlLang = (p.get('lang') || '').toLowerCase();
      const store = (localStorage.getItem('lang') || '').toLowerCase();
      if (urlLang === 'zh' || urlLang === 'en') return urlLang;
      if (store === 'zh' || store === 'en') return store;
      return 'zh';
    }
    function switchLangAndReload(next){

      const url = new URL(location.href);
      url.searchParams.set('lang', next);

    /************ menu normalize：用中文「肉類」欄 ************/
function normalizeRow(row){
  const period = row.period || row['Available Period'] || 'All Day';
  const nameZh = row.item_zh || row['Item in Chinese'] || row.item || '';
  const nameEn = row.item_en || row['Item in english'] || row['Item in English'] || '';
  
  // 準確讀取 JSON 嘅 category 或肉類
  const meatZh = row.category || row['肉類'] || row.meat_zh || row.meatZh || '';

  // 處理價錢：將可能嘅 $ 符號移走，轉做數字，如果係 null 就俾 null
  let rawPrice = row.price ?? row.Price ?? null;
  if (typeof rawPrice === 'string') rawPrice = rawPrice.replace('$', '').trim();
  const price = (rawPrice === '' || rawPrice == null) ? null : Number(rawPrice);

  // 處理 Promotion
  const promo = row.promotion || row.Promotion || row['Promotion Item'] || '';
  
  // 處理 Promotion Price
  let rawPromoPrice = row.promotionPrice ?? row['Promotion Price'] ?? row.promotion_price ?? null;
  if (typeof rawPromoPrice === 'string') rawPromoPrice = rawPromoPrice.replace('$', '').trim();
  const promoPrice = (rawPromoPrice === '' || rawPromoPrice == null) ? null : Number(rawPromoPrice);

  return {
    period: (period || 'All Day').toString().trim(),
    nameZh: (nameZh || '').toString().trim(),
    nameEn: (nameEn || '').toString().trim(),
    meat: (meatZh || '').toString().trim(),
    price: price,
    promotion: promo,
    // 只要有 Yes 就當係優惠
    isPromo: (promo.toString().trim().toLowerCase() === 'yes' || promo === true),
    promoPrice: promoPrice
  };
}
    
    async function loadMenu(){

        const res = await fetch(MENU_API_URL, { cache: 'no-store' });
        const data = await res.json();
        menuData = (Array.isArray(data) ? data : [])
          .map(normalizeRow)
          .filter(x => x.nameZh || x.nameEn);

        console.error(e);
        addBot(t.menuFail);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
      }
    }

    /************ recommendation / period / promo helpers ************/
    function chooseMeatTag(raw){
      const s = norm(raw);
      if (s.includes('牛') || s.includes('beef')) return '牛';
      if (s.includes('雞') || s.includes('chicken')) return '雞';
      if (s.includes('豬') || s.includes('pork')) return '豬';
      if (s.includes('羊') || s.includes('lamb')) return '羊';
      if (s.includes('鴨') || s.includes('duck')) return '鴨';
      if (s.includes('海鮮') || s.includes('seafood') || s.includes('sea food')) return '海鮮';
      if (s.includes('素') || s.includes('vegan') || s.includes('veg')) return '素食';
      return null;
    }

    function choosePeriod(raw) {
      const s = norm(raw);
      if (s.includes('早') || s.includes('早餐') || s.includes('breakfast') || s.includes('morning')) {
        return 'breakfast';
      }
      if (s.includes('午') || s.includes('lunch') || s.includes('茶') || s.includes('下午茶') || s.includes('tea')) {
        return 'lunch';
      }
      return null;
    }

      const name = (currentLang === 'zh') ? (d.nameZh || d.nameEn) : (d.nameEn || d.nameZh);
      const alt  = (currentLang === 'zh')
        ? (d.nameEn ? `（${d.nameEn}）` : '')
        : (d.nameZh ? `(${d.nameZh})` : '');
      const price = (d.price == null || Number.isNaN(d.price)) ? '' : ` - HK$${d.price}`;
      return `• ${name}${alt}${price}`;
    }

    function recommend(meatTag){
      const t = I18N[currentLang];
      if(!menuData.length){
        addBot(t.menuFail);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      // 攞目前應該係咩時段 (breakfast 或 lunch)
      const currentPeriod = getMealPeriodByTime();

      // 過濾條件：
      // 1. 肉類要對得中 (meatTag)
      // 2. 菜式時段 (d.period) 必須要吻合當前時段，或者係 All Day
      const list = menuData.filter(d => {
        const isMatchMeat = norm(d.meat) === norm(meatTag);
        const itemPeriod = norm(d.period);
        // 如果無寫period、寫住All Day、Drink，或者同現在時段吻合，就當可以食
        const isMatchPeriod = !itemPeriod || 
                              itemPeriod.includes('all') || 
                              itemPeriod.includes('drink') || 
                              itemPeriod.includes('snack') || 
                              itemPeriod === currentPeriod;
        
        return isMatchMeat && isMatchPeriod;
      }).slice(0, 3); // 隨機或順序抽3款

      if(!list.length){
        addBot(t.noMatch);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      addBot(t.picked);
      addBotHTML(list.map(formatLine).join('<br>'));
      addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
      addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
    }

    function listByPeriod(periodKey) {
      const t = I18N[currentLang];

      if (!menuData.length) {
        addBot(t.menuFail);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      const list = menuData.filter(d => norm(d.period) === norm(periodKey));

      if (!list.length) {
        if (currentLang === 'zh') {
          addBot('暫時喺系統入面搵唔到呢個時段嘅菜式。');
        } else {
          addBot('No dishes found for this time period.');
        }
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        return;
      }

      if (currentLang === 'zh') {
        if (periodKey === 'breakfast') addBot('以下係目前早餐時段嘅全部菜式：');
        else if (periodKey === 'lunch') addBot('以下係目前午餐時段嘅全部菜式：');
      } else {
        if (periodKey === 'breakfast') addBot('Here are all breakfast items:');
        else if (periodKey === 'lunch') addBot('Here are all lunch items:');
      }

      const html = list.map(formatLine).join('<br>');
      addBotHTML(html);
      addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
      addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
    }

    function listPromotions() {
      const t = I18N[currentLang];

      if (!menuData.length) {
        addBot(t.menuFail);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      const list = menuData.filter(d => d.isPromo);

      if (!list.length) {
        if (currentLang === 'zh') {
          addBot('暫時未有特別優惠，你可以開電子餐牌睇下其他菜式：');
        } else {
          addBot('There are no special promotions at the moment. You can check the e-menu for other dishes:');
        }
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        return;
      }

      if (currentLang === 'zh') {
        addBot('✨ 而家做緊以下精選優惠：');
      } else {
        addBot('✨ Here are our current special promotions:');
      }

      const html = list.map(d => {
        const name = (currentLang === 'zh') ? (d.nameZh || d.nameEn) : (d.nameEn || d.nameZh);
        const alt  = (currentLang === 'zh')
          ? (d.nameEn ? `（${d.nameEn}）` : '')
          : (d.nameZh ? `(${d.nameZh})` : '');
        const oriPrice = (d.price == null || Number.isNaN(d.price)) ? '' : `HK$${d.price}`;
        const newPrice = (d.promoPrice == null || Number.isNaN(d.promoPrice)) ? '' : `HK$${d.promoPrice}`;
        let priceText = '';
        if(oriPrice && newPrice) {
          priceText = ` - <del style="color:#888;">${oriPrice}</del> <strong><span style="color:#d32f2f;">${newPrice}</span></strong>`;
        } else if (newPrice) {
          priceText = ` - <strong><span style="color:#d32f2f;">${newPrice}</span></strong>`;
        } else if (oriPrice) {
          priceText = ` - ${oriPrice}`;
        }
        return `• ${name}${alt}${priceText}`;
      }).join('<br>');

      addBotHTML(html);
      addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
    }

    function listDrinks() {
      const t = I18N[currentLang];

      if (!menuData.length) {
        addBot(t.menuFail);
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      const list = menuData.filter(d => norm(d.period) === 'drink');

      if (!list.length) {
        if (currentLang === 'zh') {
          addBot('暫時喺系統入面搵唔到飲品資料，你可以開電子餐牌睇下：');
        } else {
          addBot('No drink items found. You can check the e-menu:');
        }
        addBotHTML(`👉 <a href="${EMENU_URL}" target="_blank">${t.menuLink}</a>`);
        return;
      }

      if (currentLang === 'zh') {
        addBot('以下係目前飲品選擇：');
      } else {
        addBot('Here are our current drink items:');
      }

      const html = list.map(formatLine).join('<br>');
      addBotHTML(html);
      addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
    }

    /************ flows ************/
    function flowEat(){
      rsvForm.style.display='none';
      cateringForm.style.display='none';
      memberForm.style.display='none';

      const period = getMealPeriodByTime();
      const t = I18N[currentLang];

      if (currentLang === 'zh') {
        if (period === 'breakfast') {
          addBot('而家仲係早餐時段，我可以幫你揀返啲早餐款式～');
        } else {
          addBot('而家係午餐時段，我幫你揀啲 lunch 菜式～');
        }
      } else {
        if (period === 'breakfast') {
          addBot('It is breakfast time, let me suggest some breakfast items.');
        } else {
          addBot('It is lunch time, I will suggest some lunch dishes.');
        }
      }
      addBot(t.askMeat);
    }

    function flowReservation(){
      cateringForm.style.display='none';
      memberForm.style.display='none';
      rsvForm.style.display='block';
      addBot(I18N[currentLang].rsvIntro);
    }

    function flowCatering(){
      rsvForm.style.display='none';
      memberForm.style.display='none';
      cateringForm.style.display='block';

      const t = I18N[currentLang];
      addBot(t.catIntro);

      if (currentLang === 'zh') {
        addBotHTML(`👉 <a href="${CATERING_MENU_URL}" target="_blank">到會餐牌</a>`);
        addBotHTML(`👉 <a href="${CATERING_FORM_URL}" target="_blank">到會訂購表格（可選）</a>`);
      } else {
        addBotHTML(`👉 <a href="${CATERING_MENU_URL}" target="_blank">Catering Menu</a>`);
        addBotHTML(`👉 <a href="${CATERING_FORM_URL}" target="_blank">Catering Order Form (optional)</a>`);
      }
    }

    function flowMember(){
      rsvForm.style.display='none';
      cateringForm.style.display='none';
      memberForm.style.display='block';
      addBot(I18N[currentLang].memberIntro);
    }

    function openWhatsAppReservation(){
      const pax = rsvPaxInput.value || '';
      const date = rsvDateInput.value || '';
      const time = rsvTimeInput.value || '';
      const contact = rsvPhoneInput.value || '';

      const msgZh = `我想喺「福食」訂位：\n人數：${pax ? pax + '位' : ''}\n日期：${date}\n時間：${time}\n聯絡電話：${contact}\n麻煩幫我確認安排，唔該晒！`.trim();
      const msgEn = `I would like to make a booking at "FuShi":\nPeople: ${pax}\nDate: ${date}\nTime: ${time}\nContact: ${contact}\nPlease help confirm the booking. Thank you!`.trim();
      const text = (currentLang === 'zh') ? msgZh : msgEn;
      window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(text)}`, '_blank');
      addBot(I18N[currentLang].sent);
    }

    function openWhatsAppCatering(){
      const occ = catOccasionInput.value || '';
      const pax = catPaxInput.value || '';
      const date = catDateInput.value || '';
      const time = catTimeInput.value || '';
      const items = catItemsInput.value || '';
      const contact = catContactInput.value || '';

      const msgZh = `我想喺「福食」安排到會／大量訂購：\n用途：${occ}\n人數／份量：約 ${pax}\n日期：${date}\n時間：${time}\n大約想要嘅套餐／菜式：${items}\n聯絡人／電話：${contact}\n（如已填寫 Google 到會訂購表格，可在此補充：我已填寫表格）\n麻煩提供套餐或建議，多謝！`.trim();
      const msgEn = `I would like to arrange catering / bulk order at "FuShi":\nOccasion: ${occ}\nPax / Quantity: ${pax}\nDate: ${date}\nTime: ${time}\nPreferred sets / dishes: ${items}\nContact: ${contact}\n(If I have submitted the Google catering order form, I can mention it here.)\nPlease suggest suitable sets/options. Thank you!`.trim();
      const text = (currentLang === 'zh') ? msgZh : msgEn;
      window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(text)}`, '_blank');
      addBot(I18N[currentLang].sent);
    }

    /************ Member API ************/
    async function callMemberAPI(action, email) {
      if(!MEMBER_API_URL || MEMBER_API_URL.includes('你的部署ID')) {
        return { status: 'error', message: '尚未設定 Google Apps Script URL，請先更新源代碼中嘅 MEMBER_API_URL' };
      }
      try {
        const res = await fetch(MEMBER_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: action, email: email })
        });
        return await res.json();
      } catch (e) {
        console.error('API Error:', e);
        return { status: 'error', message: '網絡異常，請稍後再試。' };
      }
    }

    memRegBtn.addEventListener('click', async () => {
      const email = memEmailInput.value.trim().toLowerCase();
      const t = I18N[currentLang];
      if (!email || !email.includes('@')) { addBot(t.memEmpty); return; }
      addBot('處理中，請稍候...');
      const response = await callMemberAPI('register', email);
      if (response.status === 'success') {
        addBot(t.memRegSuccess);
      } else if (response.message === 'already_exists') {
        addBot(t.memAlreadyExists);
      } else {
        addBot('系統發生錯誤：' + response.message);
      }
    });

    memCheckBtn.addEventListener('click', async () => {
      const email = memEmailInput.value.trim().toLowerCase();
      const t = I18N[currentLang];
      if (!email || !email.includes('@')) { addBot(t.memEmpty); return; }
      addBot('查詢中，請稍候...');
      const response = await callMemberAPI('check', email);
      if (response.status === 'success') {
        addBot(t.memFound.replace('{n}', response.stamps));
        if (response.stamps >= 10) addBot(t.memReward);
      } else if (response.message === 'not_found') {
        addBot(t.memNotFound);
      } else {
        addBot('系統發生錯誤：' + response.message);
      }
    });

    memAddStampBtn.addEventListener('click', async () => {
      const pwd = prompt('請輸入店員密碼 (預設: 102030):');
      if (pwd !== '102030') {
        alert('密碼錯誤！');
        return;
      }
      const email = memEmailInput.value.trim().toLowerCase();
      if (!email || !email.includes('@')) return alert('請先輸入客人電郵');
      addBot('加印花中...');
      const response = await callMemberAPI('addStamp', email);
      if (response.status === 'success') {
        alert('成功加咗 1 個印花！目前印花總數：' + response.stamps);
        memCheckBtn.click();
      } else {
        alert('加印花失敗：' + response.message);
      }
    });

    /************ main router ************/
        /************ main router ************/
    function handleKeyword(raw){
      const t = I18N[currentLang];
      const s = norm(raw);
      addUser(raw);

      const meatTag = chooseMeatTag(raw);
      const periodKey = choosePeriod(raw);

      // 1. 最優先處理「優惠」：只要有優惠字眼，即刻顯示 Promotion
      if (s.includes('優惠') || s.includes('promo') || s.includes('promotion') || s.includes('offer')) {
        listPromotions();
        return;
      }

      // 2. 今日食咩 / 推介
      // 注意：加咗 s.includes('推介')，但因為上面已經截咗「優惠推介」，所以唔會再撞
      if (s.includes('今日食咩') || s.includes('食咩好') || s.includes('有咩好食') || s.includes('推介') || s.includes('推薦') || s.includes('what to eat') || (s.includes('what') && s.includes('eat'))) {
        flowEat();
        if (meatTag) recommend(meatTag);
        return;
      }

      // 3. 早餐 / 午餐
      if (periodKey) {
        listByPeriod(periodKey);
        return;
      }

      // 4. 飲品
      if (s.includes('飲品') || s.includes('飲嘢') || (s.includes('飲') && s.includes('咩')) || s.includes('drink') || s.includes('drinks') || s.includes('beverage')) {
        listDrinks();
        return;
      }

      // 5. 訂位
      if (s.includes('訂位') || s.includes('訂枱') || s.includes('book') || s.includes('reservation') || s.includes('reserve')) {
        flowReservation();
        return;
      }

      // 6. 到會
      if (s.includes('到會') || s.includes('大量訂購') || s.includes('catering') || (s.includes('bulk') && s.includes('order'))) {
        flowCatering();
        return;
      }
      
      // 7. 會員印花
      if (s.includes('會員') || s.includes('印花') || s.includes('登記') || s.includes('member') || s.includes('stamp') || s.includes('loyalty') || s.includes('register')) {
        flowMember();
        return;
      }

      // 8. 外賣
      if (s.includes('外賣') || s.includes('自取') || s.includes('takeaway') || s.includes('pickup') || s.includes('delivery')) {
        addBot(currentLang === 'zh' ? '外賣／自取可以經呢個連結落單：' : 'Order takeaway / pickup here:');
        addBotHTML(`👉 <a href="${ORDER_URL}" target="_blank">${t.orderLink}</a>`);
        return;
      }

      // 9. 如果只係單純打咗 牛/雞/豬 呢啲肉類
      if (meatTag){
        recommend(meatTag);
        return;
      }

      // 10. 乜都唔中嘅提示
      addBot(currentLang === 'zh'
        ? '你可以試吓：今日食咩好？／牛／雞／豬／羊／鴨／海鮮／素食／飲品／訂位／到會／外賣／優惠／會員印花'
        : 'Try: what to eat / beef / chicken / pork / lamb / duck / seafood / vegan / drinks / booking / catering / takeaway / promotion / member stamps'
      );
    }

    /************ events ************/
    hotKeysEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-text]');
      if (!btn) return;
      handleKeyword(btn.dataset.text);
    });

    sendBtn.addEventListener('click', () => {
      const v = input.value.trim();
      if (!v) return;
      input.value = '';
      handleKeyword(v);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendBtn.click();
      }
    });

    langBtn.addEventListener('click', () => {
      const next = (currentLang === 'zh') ? 'en' : 'zh';
      switchLangAndReload(next);
    });

    rsvWaBtn.addEventListener('click', (e) => {
      e.preventDefault();
      openWhatsAppReservation();
    });

    cateringWaBtn.addEventListener('click', (e) => {
      e.preventDefault();
      openWhatsAppCatering();
    });

    /************ init ************/
    (async function init(){
      applyLanguageUI();
      welcome();
      await loadMenu();
    })();
  </script>
